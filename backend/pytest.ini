# backend/pytest.ini

[pytest]
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Show short traceback, verbose output, no warnings noise
addopts =
    -v
    --tb=short
    -p no:warnings

# Markers (add more as needed)
markers =
    unit: pure unit tests (no I/O)
    integration: tests that hit FastAPI routes